<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndoVoice AI - Text to Speech</title>
    
    <!-- CSS Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- CONFIGURATION & MAPPINGS ---
        const VOICE_MAPPINGS = {
          female: {
            'Wanita Dewasa': 'Aoede',
            'Wanita Muda': 'Callirrhoe',
            'Wanita Remaja': 'Despina',
            'Ibu': 'Erinome',
            'Guru': 'Kore',
            'Penyiar Radio': 'Leda',
            'Narator Dokumenter': 'Laomedeia',
            'Presenter Berita': 'Pulcherrima',
            'Customer Service': 'Vindemiatrix',
            'Story Teller': 'Charon',
            'Gadis Ceria': 'Kore',
            'Wanita Elegan': 'Aoede',
            'Wanita Lembut': 'Erinome',
            'Wanita Tegas': 'Pulcherrima',
            'Wanita Serius': 'Leda'
          },
          male: {
            'Pria Dewasa': 'Fenrir',
            'Pria Muda': 'Zephyr',
            'Ayah': 'Iapetus',
            'Guru': 'Orus',
            'Penyiar Radio': 'Puck',
            'Presenter Berita': 'Rasalgethi',
            'Narator Film': 'Schedar',
            'Story Teller': 'Umbriel',
            'Motivator': 'Algenib',
            'Pria Tegas': 'Alnilam',
            'Pria Santai': 'Zephyr',
            'Pria Berwibawa': 'Fenrir',
            'Pria Maskulin': 'Iapetus',
            'Pria Lembut': 'Orus',
            'Pria Serius': 'Schedar'
          }
        };

        const VIBE_MAPPINGS = {
          'Ceria': 'energetic, highly cheerful, and enthusiastic',
          'Bahagia': 'warm, friendly, and smiling',
          'Sedih': 'emotional, slightly slow, and touching',
          'Haru': 'emotional, soft, with a trembling touching voice',
          'Puitis': 'poetic, slow, dramatic, and expressive',
          'Misterius': 'deep, slow, mysterious, and intriguing',
          'Horor': 'tense, dark, slow, and scary',
          'Romantis': 'soft, warm, intimate, and romantic',
          'Heroik': 'loud, firm, brave, and heroic',
          'Motivasi': 'confident, highly energetic, and optimistic',
          'Berita': 'formal, very clear, objective, and professional',
          'Dokumenter': 'calm, steady, informative, and natural',
          'Cerita Anak': 'funny, highly expressive, and playful',
          'Doa': 'very soft, respectful, and solemn',
          'Dakwah': 'polite, calm, wise, and advising',
          'Pengumuman': 'loud, clear, formal, and easy to understand',
          'Podcast': 'relaxed, highly natural, and conversational'
        };

        // --- HELPER FUNCTIONS ---
        function base64ToUint8Array(base64) {
          const binaryString = window.atob(base64);
          const len = binaryString.length;
          const bytes = new Uint8Array(len);
          for (let i = 0; i < len; i++) {
            bytes[i] = binaryString.charCodeAt(i);
          }
          return bytes;
        }

        function pcmToWav(pcmData, sampleRate = 24000) {
          const numChannels = 1; 
          const bitsPerSample = 16;
          const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
          const blockAlign = numChannels * (bitsPerSample / 8);
          const dataSize = pcmData.byteLength;
          const buffer = new ArrayBuffer(44 + dataSize);
          const view = new DataView(buffer);

          const writeString = (view, offset, string) => {
            for (let i = 0; i < string.length; i++) {
              view.setUint8(offset + i, string.charCodeAt(i));
            }
          };

          writeString(view, 0, 'RIFF');
          view.setUint32(4, 36 + dataSize, true);
          writeString(view, 8, 'WAVE');
          writeString(view, 12, 'fmt ');
          view.setUint32(16, 16, true);
          view.setUint16(20, 1, true);
          view.setUint16(22, numChannels, true);
          view.setUint32(24, sampleRate, true);
          view.setUint32(28, byteRate, true);
          view.setUint16(32, blockAlign, true);
          view.setUint16(34, bitsPerSample, true);
          writeString(view, 36, 'data');
          view.setUint32(40, dataSize, true);

          const pcmView = new Uint8Array(pcmData);
          const targetView = new Uint8Array(buffer, 44);
          targetView.set(pcmView);

          return new Blob([buffer], { type: 'audio/wav' });
        }

        function formatBytes(bytes, decimals = 2) {
          if (!+bytes) return '0 Bytes';
          const k = 1024;
          const dm = decimals < 0 ? 0 : decimals;
          const sizes = ['Bytes', 'KB', 'MB', 'GB'];
          const i = Math.floor(Math.log(bytes) / Math.log(k));
          return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        function formatTime(seconds) {
          if (isNaN(seconds)) return "00:00";
          const m = Math.floor(seconds / 60);
          const s = Math.floor(seconds % 60);
          return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // --- MAIN COMPONENT ---
        function App() {
          // Input States
          const [text, setText] = useState('');
          const [gender, setGender] = useState('female');
          const [persona, setPersona] = useState('Wanita Dewasa');
          const [vibe, setVibe] = useState('Podcast');
          
          // Audio Setting States
          const [speed, setSpeed] = useState(1.0);
          const [pitch, setPitch] = useState(0);
          const [volume, setVolume] = useState(100);
          const [expression, setExpression] = useState(80);

          // Process States
          const [isLoading, setIsLoading] = useState(false);
          const [error, setError] = useState('');
          
          // Output States
          const [audioUrl, setAudioUrl] = useState(null);
          const [audioBlob, setAudioBlob] = useState(null);
          const [audioMeta, setAudioMeta] = useState(null);
          const [isPlaying, setIsPlaying] = useState(false);
          const [currentTime, setCurrentTime] = useState(0);
          const [duration, setDuration] = useState(0);

          const audioRef = useRef(null);

          // Update persona when gender changes
          useEffect(() => {
            const defaultPersona = gender === 'female' ? 'Wanita Dewasa' : 'Pria Dewasa';
            setPersona(defaultPersona);
          }, [gender]);

          // Handle Audio Player Events
          useEffect(() => {
            const audio = audioRef.current;
            if (!audio) return;

            const handleTimeUpdate = () => setCurrentTime(audio.currentTime);
            const handleLoadedMetadata = () => setDuration(audio.duration);
            const handleEnded = () => setIsPlaying(false);

            audio.addEventListener('timeupdate', handleTimeUpdate);
            audio.addEventListener('loadedmetadata', handleLoadedMetadata);
            audio.addEventListener('ended', handleEnded);

            return () => {
              audio.removeEventListener('timeupdate', handleTimeUpdate);
              audio.removeEventListener('loadedmetadata', handleLoadedMetadata);
              audio.removeEventListener('ended', handleEnded);
            };
          }, [audioUrl]);

          const togglePlayPause = () => {
            if (!audioRef.current) return;
            if (isPlaying) {
              audioRef.current.pause();
            } else {
              audioRef.current.play();
            }
            setIsPlaying(!isPlaying);
          };

          const handleSeek = (e) => {
            if (!audioRef.current) return;
            const time = Number(e.target.value);
            audioRef.current.currentTime = time;
            setCurrentTime(time);
          };

          // Generate Audio Function
          const handleGenerate = async () => {
            if (!text.trim()) {
              setError("Silakan masukkan narasi terlebih dahulu.");
              return;
            }

            setIsLoading(true);
            setError('');
            setAudioUrl(null);
            setIsPlaying(false);
            setCurrentTime(0);

            const selectedVoiceId = VOICE_MAPPINGS[gender][persona];
            const vibeInstruction = VIBE_MAPPINGS[vibe];
            
            let paceInstruction = speed > 1.2 ? "fast pace" : speed < 0.8 ? "slow pace" : "normal pace";
            let pitchInstruction = pitch > 0.5 ? "higher pitch" : pitch < -0.5 ? "lower pitch" : "natural pitch";
            
            const promptText = `Please speak the following Indonesian text with a ${vibeInstruction} tone. 
        Speak at a ${paceInstruction} and ${pitchInstruction}. 
        Read numbers, abbreviations, and symbols naturally in formal Indonesian.
        Expression intensity level: ${expression}%.
        Text: ${text}`;

            try {
              // --- PENTING UNTUK HOSTING SENDIRI ---
              // Isi string kosong ini dengan API Key Anda dari aistudio.google.com
              const apiKey = ""; 
              // -------------------------------------
              
              const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;

              const payload = {
                contents: [{ parts: [{ text: promptText }] }],
                generationConfig: {
                  responseModalities: ["AUDIO"],
                  speechConfig: {
                    voiceConfig: { prebuiltVoiceConfig: { voiceName: selectedVoiceId } }
                  }
                },
                model: "gemini-2.5-flash-preview-tts"
              };

              let retries = 5;
              let delay = 1000;
              let response;
              let responseData;

              while (retries > 0) {
                response = await fetch(url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload)
                });

                if (response.ok) {
                   responseData = await response.json();
                   break;
                }

                retries--;
                if (retries === 0) throw new Error(`API Error: ${response.status}`);
                await new Promise(r => setTimeout(r, delay));
                delay *= 2;
              }

              if (!responseData?.candidates?.[0]?.content?.parts?.[0]?.inlineData) {
                throw new Error("Gagal mendapatkan data audio dari server.");
              }

              const inlineData = responseData.candidates[0].content.parts[0].inlineData;
              const base64Audio = inlineData.data;
              
              const pcmBytes = base64ToUint8Array(base64Audio);
              const wavBlob = pcmToWav(pcmBytes.buffer, 24000); 
              const wavUrl = URL.createObjectURL(wavBlob);

              setAudioBlob(wavBlob);
              setAudioUrl(wavUrl);
              
              setAudioMeta({
                voice: selectedVoiceId,
                vibe: vibe,
                size: formatBytes(wavBlob.size),
                sampleRate: '24,000 Hz',
                format: 'WAV (PCM 16-bit Mono)'
              });
              
              setTimeout(() => {
                if(audioRef.current) {
                  audioRef.current.volume = volume / 100;
                }
              }, 100);

            } catch (err) {
              console.error(err);
              setError(`Terjadi kesalahan: ${err.message}. Pastikan koneksi stabil & API Key valid.`);
            } finally {
              setIsLoading(false);
            }
          };

          const handleDownloadWav = () => {
            if (!audioUrl) return;
            const a = document.createElement('a');
            a.href = audioUrl;
            a.download = `IndoVoice_${persona.replace(/\s+/g, '')}_${vibe}_${new Date().getTime()}.wav`;
            a.click();
          };

          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 font-sans p-4 sm:p-6 lg:p-8 pb-24">
              
              {/* Header */}
              <header className="max-w-6xl mx-auto mb-8 flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="bg-indigo-600 w-12 h-12 flex items-center justify-center rounded-xl text-white shadow-lg shadow-indigo-200">
                    <i className="fa-solid fa-microphone text-xl"></i>
                  </div>
                  <div>
                    <h1 className="text-2xl font-bold text-slate-800 tracking-tight">IndoVoice AI</h1>
                    <p className="text-sm text-slate-500 font-medium">Generator Audio Bahasa Indonesia Natural</p>
                  </div>
                </div>
              </header>

              {/* Main Layout */}
              <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                {/* Left Column: Input & Settings */}
                <div className="lg:col-span-7 space-y-6">
                  
                  <section className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                    <div className="flex justify-between items-end mb-3">
                      <label className="block text-sm font-bold text-slate-800">Masukkan Narasi</label>
                      <span className="text-xs font-medium text-slate-400">{text.length} karakter</span>
                    </div>
                    <textarea
                      value={text}
                      onChange={(e) => setText(e.target.value)}
                      placeholder="Tulis narasi yang ingin diubah menjadi suara. Contoh: Pada tahun 2026, teknologi AI akan semakin berkembang pesat..."
                      className="w-full h-48 p-4 bg-slate-50/50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all resize-y text-slate-700 text-sm leading-relaxed"
                    />
                    <div className="mt-4 flex flex-wrap gap-2 text-xs font-medium text-slate-600">
                      <span className="flex items-center bg-slate-100 px-2.5 py-1.5 rounded-lg"><i className="fa-solid fa-circle-check text-indigo-500 mr-1.5"></i> Angka dibaca natural</span>
                      <span className="flex items-center bg-slate-100 px-2.5 py-1.5 rounded-lg"><i className="fa-solid fa-circle-check text-indigo-500 mr-1.5"></i> Paragraf panjang didukung</span>
                      <span className="flex items-center bg-slate-100 px-2.5 py-1.5 rounded-lg"><i className="fa-solid fa-circle-check text-indigo-500 mr-1.5"></i> Emoji diabaikan</span>
                    </div>
                  </section>

                  <section className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
                    
                    <div className="space-y-5">
                      <div>
                        <label className="block text-sm font-bold text-slate-800 mb-3">Gender Suara</label>
                        <div className="flex gap-2 p-1 bg-slate-100 rounded-xl">
                          <button 
                            onClick={() => setGender('female')}
                            className={`flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold transition-all ${gender === 'female' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                          >
                            Wanita
                          </button>
                          <button 
                            onClick={() => setGender('male')}
                            className={`flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold transition-all ${gender === 'male' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                          >
                            Pria
                          </button>
                        </div>
                      </div>
                      
                      <div>
                        <label className="block text-sm font-bold text-slate-800 mb-3">Karakter Suara</label>
                        <select 
                          value={persona}
                          onChange={(e) => setPersona(e.target.value)}
                          className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer"
                        >
                          {Object.keys(VOICE_MAPPINGS[gender]).map(p => (
                            <option key={p} value={p}>{p}</option>
                          ))}
                        </select>
                      </div>

                      <div>
                        <label className="block text-sm font-bold text-slate-800 mb-3">Emosi (Vibe)</label>
                        <select 
                          value={vibe}
                          onChange={(e) => setVibe(e.target.value)}
                          className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer"
                        >
                          {Object.keys(VIBE_MAPPINGS).map(v => (
                            <option key={v} value={v}>{v}</option>
                          ))}
                        </select>
                      </div>
                    </div>

                    <div className="space-y-6">
                      <h3 className="text-sm font-bold text-slate-800 flex items-center border-b border-slate-100 pb-3">
                        <i className="fa-solid fa-sliders text-indigo-500 mr-2"></i> Pengaturan Audio
                      </h3>
                      
                      <div className="space-y-2">
                        <div className="flex justify-between text-xs font-semibold text-slate-600">
                          <label>Kecepatan Bicara</label>
                          <span className="bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-md">{speed}x</span>
                        </div>
                        <input 
                          type="range" min="0.5" max="2.0" step="0.1" 
                          value={speed} onChange={(e) => setSpeed(Number(e.target.value))}
                          className="w-full accent-indigo-600"
                        />
                      </div>

                      <div className="space-y-2">
                        <div className="flex justify-between text-xs font-semibold text-slate-600">
                          <label>Pitch Suara</label>
                          <span className="bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-md">{pitch > 0 ? `+${pitch}` : pitch}</span>
                        </div>
                        <input 
                          type="range" min="-2" max="2" step="0.5" 
                          value={pitch} onChange={(e) => setPitch(Number(e.target.value))}
                          className="w-full accent-indigo-600"
                        />
                      </div>

                      <div className="space-y-2">
                        <div className="flex justify-between text-xs font-semibold text-slate-600">
                          <label>Tingkat Ekspresi</label>
                          <span className="bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-md">{expression}%</span>
                        </div>
                        <input 
                          type="range" min="0" max="100" step="1" 
                          value={expression} onChange={(e) => setExpression(Number(e.target.value))}
                          className="w-full accent-indigo-600"
                        />
                      </div>
                    </div>
                  </section>

                  <button
                    onClick={handleGenerate}
                    disabled={isLoading}
                    className={`w-full py-4 rounded-2xl text-white font-bold text-lg flex items-center justify-center gap-3 transition-all ${
                      isLoading ? 'bg-indigo-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 hover:shadow-xl hover:shadow-indigo-200 active:scale-[0.98]'
                    }`}
                  >
                    {isLoading ? (
                      <React.Fragment>
                        <i className="fa-solid fa-rotate-right animate-spin text-xl"></i>
                        Sedang membuat suara...
                      </React.Fragment>
                    ) : (
                      <React.Fragment>
                        <i className="fa-solid fa-file-audio text-xl"></i>
                        Generate Audio Sekarang
                      </React.Fragment>
                    )}
                  </button>

                  <div className="bg-blue-50/80 border border-blue-100 text-blue-800 p-4 rounded-2xl flex items-start gap-3 text-sm">
                    <i className="fa-solid fa-circle-info text-xl text-blue-500 mt-0.5 shrink-0"></i>
                    <p className="leading-relaxed">
                      Sistem akan memetakan preferensi karakter lokal (seperti "Wanita Dewasa") ke profil suara model AI terdekat. Pastikan Anda memasukkan API Key yang benar saat di-hosting.
                    </p>
                  </div>

                </div>

                {/* Right Column: Output & Player */}
                <div className="lg:col-span-5 space-y-6">
                  <div className="bg-[#1a2332] text-white rounded-3xl shadow-xl p-6 md:p-8 flex flex-col h-full min-h-[450px] relative overflow-hidden">
                    
                    <div className="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>
                    
                    <h2 className="text-lg font-bold flex items-center gap-3 mb-6 border-b border-slate-700/50 pb-4 relative z-10">
                      <i className="fa-solid fa-wave-square text-indigo-400"></i> Output Audio
                    </h2>

                    {error && (
                      <div className="bg-red-500/10 text-red-300 p-4 rounded-xl flex items-center gap-3 text-sm mb-4 border border-red-500/20 relative z-10">
                        <i className="fa-solid fa-triangle-exclamation text-xl shrink-0"></i>
                        <p>{error}</p>
                      </div>
                    )}

                    {!audioUrl && !isLoading && !error && (
                      <div className="flex-1 flex flex-col items-center justify-center text-slate-400 opacity-60 relative z-10">
                        <i className="fa-solid fa-file-audio text-6xl mb-5 text-slate-600"></i>
                        <p className="text-center text-sm px-4">Audio akan muncul di sini setelah Anda menekan tombol Generate.</p>
                      </div>
                    )}

                    {isLoading && (
                      <div className="flex-1 flex flex-col items-center justify-center text-indigo-300 relative z-10">
                        <div className="flex items-center gap-2 mb-6">
                          <div className="w-2 h-8 bg-indigo-500 animate-pulse rounded-full"></div>
                          <div className="w-2 h-12 bg-indigo-400 animate-pulse delay-75 rounded-full"></div>
                          <div className="w-2 h-16 bg-indigo-300 animate-pulse delay-150 rounded-full"></div>
                          <div className="w-2 h-12 bg-indigo-400 animate-pulse delay-200 rounded-full"></div>
                          <div className="w-2 h-8 bg-indigo-500 animate-pulse delay-300 rounded-full"></div>
                        </div>
                        <p className="text-sm font-semibold animate-pulse tracking-wide">Memproses AI Text-to-Speech...</p>
                      </div>
                    )}

                    {audioUrl && (
                      <div className="flex flex-col flex-1 relative z-10">
                        <audio ref={audioRef} src={audioUrl} />
                        
                        <div className="h-32 bg-[#0f1523] rounded-2xl mb-8 flex items-center justify-center overflow-hidden border border-slate-700/50 relative shadow-inner">
                           {isPlaying ? (
                             <div className="flex items-center justify-center gap-1 w-full px-4 h-full">
                               {[...Array(40)].map((_, i) => (
                                 <div 
                                   key={i} 
                                   className="w-1.5 bg-indigo-500 rounded-full"
                                   style={{ 
                                     height: `${Math.max(15, Math.random() * 100)}%`,
                                     transition: 'height 0.1s ease-in-out'
                                   }}
                                 />
                               ))}
                             </div>
                           ) : (
                             <div className="flex items-center justify-center gap-1 w-full px-4 h-full opacity-30">
                               {[...Array(40)].map((_, i) => (
                                 <div key={i} className="w-1.5 h-2 bg-slate-500 rounded-full" />
                               ))}
                             </div>
                           )}
                        </div>

                        <div className="bg-white/5 rounded-2xl p-5 mb-6 backdrop-blur-sm border border-white/10">
                          <div className="flex items-center justify-between mb-5">
                            <button 
                              onClick={togglePlayPause}
                              className="w-14 h-14 bg-indigo-500 hover:bg-indigo-400 rounded-full flex items-center justify-center text-white transition-transform active:scale-90 shadow-lg shadow-indigo-500/30"
                            >
                              {isPlaying ? <i className="fa-solid fa-pause text-xl"></i> : <i className="fa-solid fa-play text-xl ml-1"></i>}
                            </button>

                            <div className="flex items-center gap-3 bg-black/20 rounded-xl px-4 py-2 border border-white/5">
                              <i className="fa-solid fa-volume-high text-slate-300"></i>
                              <input 
                                type="range" min="0" max="100" 
                                value={volume}
                                onChange={(e) => {
                                  setVolume(Number(e.target.value));
                                  if(audioRef.current) audioRef.current.volume = e.target.value / 100;
                                }}
                                className="w-24 accent-indigo-400"
                              />
                            </div>
                          </div>

                          <div className="flex items-center gap-3 text-xs text-slate-300 font-mono font-medium">
                            <span>{formatTime(currentTime)}</span>
                            <input 
                              type="range" min="0" max={duration || 0} step="0.01"
                              value={currentTime}
                              onChange={handleSeek}
                              className="flex-1 accent-indigo-400 h-2 bg-slate-700 rounded-lg cursor-pointer appearance-none"
                            />
                            <span>{formatTime(duration)}</span>
                          </div>
                        </div>

                        {audioMeta && (
                          <div className="bg-white/5 rounded-2xl p-5 text-sm mb-6 flex-1 border border-white/10">
                            <h3 className="font-semibold text-slate-200 mb-3 pb-2 border-b border-white/10">Informasi File</h3>
                            <div className="grid grid-cols-2 gap-y-3 gap-x-4 text-slate-300 text-xs">
                              <div><span className="text-slate-500 block mb-1">Persona:</span><span className="font-medium text-white">{persona}</span></div>
                              <div><span className="text-slate-500 block mb-1">Vibe:</span><span className="font-medium text-white">{audioMeta.vibe}</span></div>
                              <div><span className="text-slate-500 block mb-1">Format:</span><span className="font-medium text-white">{audioMeta.format}</span></div>
                              <div><span className="text-slate-500 block mb-1">Sample Rate:</span><span className="font-medium text-white">{audioMeta.sampleRate}</span></div>
                            </div>
                          </div>
                        )}

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-auto">
                          <button 
                            onClick={handleDownloadWav}
                            className="flex items-center justify-center gap-2 bg-white/10 hover:bg-white/20 py-3.5 rounded-xl text-sm font-semibold transition-colors"
                          >
                            <i className="fa-solid fa-download"></i> Download WAV
                          </button>
                          <button 
                            onClick={() => handleGenerate()}
                            className="flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 py-3.5 rounded-xl text-sm font-semibold transition-colors"
                          >
                            <i className="fa-solid fa-rotate-right"></i> Generate Ulang
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </main>

              {/* --- FOOTER MODERN --- */}
              <footer className="max-w-6xl mx-auto mt-12 px-2">
                <div className="bg-white rounded-[2rem] border border-slate-200 p-6 md:p-8 shadow-sm flex flex-col md:flex-row items-center justify-between gap-6">
                  
                  <div className="flex flex-col items-center md:items-start gap-1">
                    <p className="text-slate-500 text-sm font-medium flex items-center gap-1.5">
                      Dibuat dengan <span className="text-red-500 animate-pulse text-lg">❤️</span> oleh
                    </p>
                    <span className="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-500 tracking-tight">
                      Arom Kobama
                    </span>
                  </div>
                  
                  <div className="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
                    <a 
                      href="https://tiktok.com/@aromkobama" 
                      target="_blank" 
                      rel="noopener noreferrer"
                      className="w-full sm:w-auto flex items-center justify-center gap-2 text-slate-700 hover:text-white hover:bg-slate-900 transition-all duration-300 bg-slate-50 border border-slate-200 px-6 py-3 rounded-2xl text-sm font-bold group"
                    >
                      <i className="fa-brands fa-tiktok text-xl"></i>
                      <span>TikTok</span>
                    </a>
                    
                    <a 
                      href="https://instagram.com/aromkobama" 
                      target="_blank" 
                      rel="noopener noreferrer"
                      className="w-full sm:w-auto flex items-center justify-center gap-2 text-slate-700 hover:text-white hover:border-transparent transition-all duration-300 bg-slate-50 border border-slate-200 px-6 py-3 rounded-2xl text-sm font-bold hover:bg-gradient-to-tr hover:from-amber-500 hover:via-pink-500 hover:to-fuchsia-600"
                    >
                      <i className="fa-brands fa-instagram text-xl"></i>
                      <span>Instagram</span>
                    </a>
                  </div>

                </div>
              </footer>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
